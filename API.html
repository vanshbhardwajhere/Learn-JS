<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="get">Get</button>
    <div id="result"></div>
</body>
<script>
    const gett = document.querySelector('#get').addEventListener('click',()=>{
        const apiUrl = "https://api.github.com/users/vanshbhardwajhere";
        const xhr = new XMLHttpRequest()
        xhr.open('GET',apiUrl);
        xhr.onreadystatechange = function(){
            console.log(xhr.readyState);
                if(xhr.readyState === 4){
                    const data = JSON.parse(this.responseText);

                    console.log(data)
                    const img = document.createElement('img');
                    img.src = data.avatar_url;
                    img.width = 150;
                    img.alt = "Profile Photo";
                    const follower = document.createElement('h2');
                    follower.innerHTML = `Followers: ${data.followers}`;
                    const result = document.querySelector('#result');
                    result.innerHTML = "";
                    result.appendChild(img);
                    result.appendChild(follower)
                }
            }
            xhr.send()
            
        }
        
    )
    
</script>
</html>
